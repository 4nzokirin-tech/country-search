<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Country Copy</title>


    <style>

        * {
            box-sizing: border-box;
        }


        html,
        body {

            margin: 0;
            padding: 0;

            width: 100%;
            height: 100%;

            overflow: hidden;

            font-family: Arial, sans-serif;
        }


        body {

            background: #f5f5f5;

            display: flex;

            justify-content: center;
            align-items: center;
        }


        .app {

            width: 100%;

            max-width: 900px;

            height: 100dvh;

            padding: 12px;

            display: flex;

            flex-direction: column;

            overflow: hidden;
        }


        /* HEADER */

        .header {

            flex: 0 0 50px;

            display: flex;

            align-items: center;

            justify-content: center;

            gap: 20px;

            overflow: hidden;
        }


        h1 {

            margin: 0;

            font-size: 24px;

            text-align: center;

            white-space: nowrap;
        }


        /* NAVIGATION BUTTONS */

        .navigation-button {

            width: 45px;

            height: 38px;

            flex-shrink: 0;

            border: none;

            border-radius: 8px;

            background: white;

            box-shadow:

                0 2px 5px
                rgba(0, 0, 0, 0.15);

            font-size: 22px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.15s;
        }


        .navigation-button:active {

            transform: scale(0.92);
        }


        /* DISABLED NAVIGATION BUTTON */

        .navigation-button:disabled {

            background: #999;

            color: #555;

            cursor: not-allowed;

            box-shadow: none;
        }


        /* COUNTRY GRID */

        .country-list {

            flex: 1;

            min-height: 0;

            width: 100%;

            display: grid;

            grid-template-columns:

                repeat(4, 1fr);

            grid-template-rows:

                repeat(15, 1fr);

            gap: 6px;

            overflow: hidden;
        }


        /* COUNTRY BUTTON */

        .country-button {

            width: 100%;

            height: 100%;

            min-width: 0;

            min-height: 0;

            border: none;

            border-radius: 8px;

            background: white;

            box-shadow:

                0 2px 5px
                rgba(0, 0, 0, 0.15);

            font-size: 13px;

            font-weight: bold;

            cursor: pointer;

            padding: 3px;

            overflow: hidden;

            text-overflow: ellipsis;

            white-space: nowrap;

            transition: 0.15s;
        }


        .country-button:active {

            transform: scale(0.95);
        }


        .country-button.copied {

            background: #b7f7c1;
        }


    </style>

</head>


<body>


    <div class="app">


        <!-- HEADER -->

        <div class="header">


            <button

                id="leftButton"

                class="navigation-button"

                onclick="moveLeft()"

            >

                ←

            </button>


            <h1>

                Country Copy

            </h1>


            <button

                id="rightButton"

                class="navigation-button"

                onclick="moveRight()"

            >

                →

            </button>


        </div>


        <!-- COUNTRY GRID -->

        <div

            id="countryList"

            class="country-list"

        >

        </div>


    </div>


    <script>


        /*
        =====================================================

        180 COUNTRIES

        12 COLUMNS

        15 COUNTRIES PER COLUMN

        =====================================================
        */

            "Afghanistan",

            "Bangladesh",

            "Barbados",


            // COLUMN 2

            "Belarus",

            "Belgium",

            "Belize",

            "Benin",

            "Bhutan",

            "Bolivia",

            "Bosnia and Herzegovina",

            "Botswana",

            "Brazil",

            "Brunei",

            "Bulgaria",

            "Burkina Faso",

            "Burundi",

            "Cabo Verde",

            "Cambodia",


            // COLUMN 3

            "Cameroon",

            "Canada",

            "Central African Republic",

            "Chad",

            "Chile",

            "China",

            "Colombia",

            "Comoros",

            "Congo",

            "Costa Rica",

            "Croatia",

            "Cuba",

            "Cyprus",

            "Czechia",

            "Denmark",


            // COLUMN 4

            "Djibouti",

            "Dominica",

            "Dominican Republic",

            "Ecuador",

            "Egypt",

            "El Salvador",

            "Equatorial Guinea",

            "Eritrea",

            "Estonia",

            "Eswatini",

            "Ethiopia",

            "Fiji",

            "Finland",

            "France",

            "Gabon",


            // COLUMN 5

            "Gambia",

            "Georgia",

            "Germany",

            "Ghana",

            "Greece",

            "Grenada",

            "Guatemala",

            "Guinea",

            "Guinea-Bissau",

            "Guyana",

            "Haiti",

            "Honduras",

            "Hungary",

            "Iceland",

            "India",


            // COLUMN 6

            "Indonesia",

            "Iran",

            "Iraq",

            "Ireland",

            "Israel",

            "Italy",

            "Jamaica",

            "Japan",

            "Jordan",

            "Kazakhstan",

            "Kenya",

            "Kiribati",

            "Kuwait",

            "Kyrgyzstan",

            "Laos",


            // COLUMN 7

            "Latvia",

            "Lebanon",

            "Lesotho",

            "Libya",

            "Liechtenstein",

            "Lithuania",

            "Luxembourg",

            "Madagascar",

            "Malawi",

            "Malaysia",

            "Maldives",

            "Marshall Islands",


            // COLUMN 8

            "Mauritania",

            "Mauritius",

            "Mexico",

            "Moldova",

            "Monaco",

            "Mongolia",

            "Montenegro",

            "Morocco",

            "Mozambique",

            // COLUMN 9

            "North Macedonia",

            "Panama",

            "Paraguay",

            "Peru",

            "Philippines",


            // COLUMN 10

            "Poland",

            "Portugal",

            "Qatar",

            "Romania",

            "Russia",

            "Rwanda",

            "Saint Kitts and Nevis",

            "Saint Lucia",

            "Saint Vincent and the Grenadines",

            "Samoa",

            "San Marino",

            "Sao Tome and Principe",

            "Saudi Arabia",

            "Senegal",

            "Serbia",


            // COLUMN 11

            "Seychelles",

            "Sierra Leone",

            "Singapore",

            "Slovakia",

            "Slovenia",

            "Solomon Islands",

            "Somalia",

            "South Africa",

            "South Korea",

            "South Sudan",

            "Spain",

            "Sri Lanka",

            "Sudan",

            "Suriname",

            "Sweden",


            // COLUMN 12

            "Switzerland",

            "Syria",

            "Tajikistan",

            "Tanzania",

            "Thailand",

            "Timor-Leste",

            "Togo",

            "Tonga",

            "Trinidad and Tobago",

            "Tunisia",

            "Turkey",

            "Turkmenistan",

            "Tuvalu",

            "Uganda",

            "Ukraine"

        ];


        /*
        =====================================================

        SETTINGS

        =====================================================
        */


        const countriesPerColumn = 15;

        const visibleColumns = 4;


        let currentColumn = 0;


        const totalColumns =

            Math.ceil(

                countries.length /

                countriesPerColumn

            );


        const countryList =

            document.getElementById(

                "countryList"

            );


        const leftButton =

            document.getElementById(

                "leftButton"

            );


        const rightButton =

            document.getElementById(

                "rightButton"

            );


        /*
        =====================================================

        DISPLAY COUNTRIES

        =====================================================
        */


        function showCountries() {


            countryList.innerHTML = "";


            const startIndex =

                currentColumn *

                countriesPerColumn;


            const endIndex =

                startIndex +

                (

                    countriesPerColumn *

                    visibleColumns

                );


            const visibleCountries =

                countries.slice(

                    startIndex,

                    endIndex

                );


            visibleCountries.forEach(

                country => {


                    const button =

                        document.createElement(

                            "button"

                        );


                    button.className =

                        "country-button";


                    button.innerText =

                        country;


                    button.onclick =

                        function() {

                            copyCountry(

                                button

                            );

                        };


                    countryList.appendChild(

                        button

                    );


                }

            );


            updateNavigationButtons();

        }


        /*
        =====================================================

        MOVE LEFT

        =====================================================
        */


        function moveLeft() {


            if (

                currentColumn > 0

            ) {


                currentColumn--;


                showCountries();

            }

        }


        /*
        =====================================================

        MOVE RIGHT

        =====================================================
        */


        function moveRight() {


            if (

                currentColumn <

                totalColumns -

                visibleColumns

            ) {


                currentColumn++;


                showCountries();

            }

        }


        /*
        =====================================================

        UPDATE NAVIGATION BUTTONS

        =====================================================
        */


        function updateNavigationButtons() {


            leftButton.disabled =

                currentColumn === 0;


            rightButton.disabled =

                currentColumn >=

                totalColumns -

                visibleColumns;

        }


        /*
        =====================================================

        COPY COUNTRY

        =====================================================
        */


        function copyCountry(button) {


            const country =

                button.innerText.trim();


            navigator.clipboard.writeText(

                country

            );


            const originalText =

                button.innerText;


            button.innerText =

                "Copied!";


            button.classList.add(

                "copied"

            );


            setTimeout(

                function() {


                    button.innerText =

                        originalText;


                    button.classList.remove(

                        "copied"

                    );


                },

                1000

            );

        }


        /*
        =====================================================

        START

        =====================================================
        */


        showCountries();


    </script>


</body>

</html>
