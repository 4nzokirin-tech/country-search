<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Country Search</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app {
            width: 100%;
            max-width: 500px;
            height: 100dvh;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            margin: 5px 0 12px;
            font-size: 24px;
        }

        .country-list {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(10, 1fr);
            gap: 6px;
        }

        .country-button {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 10px;

            background: white;

            box-shadow:
                0 2px 5px rgba(0, 0, 0, 0.15);

            font-size: 14px;
            font-weight: bold;

            cursor: pointer;

            padding: 3px;
        }

        .country-button:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>

    <div class="app">

        <h1>Country Search</h1>

        <div class="country-list">

            <button
                class="country-button"
                onclick="searchCountry('Togo')"
            >
                Togo
            </button>

            <button
                class="country-button"
                onclick="searchCountry('Tonga')"
            >
                Tonga
            </button>

            <button
                class="country-button"
                onclick="searchCountry('Trinidad and Tobago')"
            >
                Trinidad and Tobago
            </button>

            <button
                class="country-button"
                onclick="searchCountry('Tunisia')"
            >
                Tunisia
            </button>

            <button
                class="country-button"
                onclick="searchCountry('Turkey')"
            >
                Turkey
            </button>

            <button
                class="country-button"
                onclick="searchCountry('Turkmenistan')"
            >
                Turkmenistan
            </button>

            <button
                class="country-button"
                onclick="searchCountry('Tuvalu')"
            >
                Tuvalu
            </button>

            <button
                class="country-button"
                onclick="searchCountry('Uganda')"
            >
                Uganda
            </button>

            <button
                class="country-button"
                onclick="searchCountry('Ukraine')"
            >
                Ukraine
            </button>

            <button
                class="country-button"
                onclick="searchCountry('United Arab Emirates')"
            >
                United Arab Emirates
            </button>

            <button
                class="country-button"
                onclick="searchCountry('United Kingdom')"
            >
                United Kingdom
            </button>

            <button
                class="country-button"
                onclick="searchCountry('United States of America')"
            >
                United States of America
            </button>

            <button
                class="country-button"
                onclick="searchCountry('Uruguay')"
            >
                Uruguay
            </button>

            <button
                class="country-button"
                onclick="searchCountry('Uzbekistan')"
            >
                Uzbekistan
            </button>

            <button
                class="country-button"
                onclick="searchCountry('Vanuatu')"
            >
                Vanuatu
            </button>

            <button
                class="country-button"
                onclick="searchCountry('Venezuela')"
            >
                Venezuela
            </button>

            <button
                class="country-button"
                onclick="searchCountry('Vietnam')"
            >
                Vietnam
            </button>

            <button
                class="country-button"
                onclick="searchCountry('Yemen')"
            >
                Yemen
            </button>

            <button
                class="country-button"
                onclick="searchCountry('Zambia')"
            >
                Zambia
            </button>

            <button
                class="country-button"
                onclick="searchCountry('Zimbabwe')"
            >
                Zimbabwe
            </button>

        </div>

    </div>


    <script>

        function searchCountry(country) {

            /*
                Open Bing search.

                The country name is placed
                directly into Bing's search query.
            */

            const bingURL =
                "https://www.bing.com/search?q=" +
                encodeURIComponent(country);

            window.location.href = bingURL;
        }

    </script>

</body>
</html>
