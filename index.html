<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Make the webpage fit properly on a phone -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Country Search</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app {
            width: 100%;
            max-width: 500px;
            height: 100dvh;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            margin: 10px 0 20px 0;
            font-size: 28px;
        }

        .country-list {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            width: 100%;
            border: none;
            border-radius: 12px;
            background: white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>

    <div class="app">

        <h1>Country Search</h1>

        <div class="country-list">

            <button onclick="searchCountry('Afghanistan')">
                Afghanistan
            </button>

            <button onclick="searchCountry('Albania')">
                Albania
            </button>

            <button onclick="searchCountry('Algeria')">
                Algeria
            </button>

            <button onclick="searchCountry('Andorra')">
                Andorra
            </button>

            <button onclick="searchCountry('Angola')">
                Angola
            </button>

            <button onclick="searchCountry('Antigua and Barbuda')">
                Antigua and Barbuda
            </button>

            <button onclick="searchCountry('Argentina')">
                Argentina
            </button>

            <button onclick="searchCountry('Armenia')">
                Armenia
            </button>

            <button onclick="searchCountry('Australia')">
                Australia
            </button>

            <button onclick="searchCountry('Austria')">
                Austria
            </button>

            <button onclick="searchCountry('Azerbaijan')">
                Azerbaijan
            </button>

            <button onclick="searchCountry('Bahamas')">
                Bahamas
            </button>

            <button onclick="searchCountry('Bahrain')">
                Bahrain
            </button>

            <button onclick="searchCountry('Bangladesh')">
                Bangladesh
            </button>

            <button onclick="searchCountry('Barbados')">
                Barbados
            </button>

        </div>

    </div>

    <script>
        function searchCountry(country) {

            // Create a Bing search URL
            const bingSearch =
                "https://www.bing.com/search?q=" +
                encodeURIComponent(country);

            // Open the Bing search
            window.location.href = bingSearch;
        }
    </script>

</body>
</html>
