<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Country Search</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
        }

        .app {
            width: 100%;
            max-width: 500px;
            height: 100dvh;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            margin: 5px 0 10px;
            font-size: 24px;
        }

        .country-list {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(10, 1fr);
            gap: 6px;
        }

        button {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 10px;
            background: white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.15);
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            padding: 2px;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>

    <div class="app">

        <h1>Country Search</h1>

        <div class="country-list">

            <button onclick="searchCountry('Afghanistan')">Afghanistan</button>
            <button onclick="searchCountry('Albania')">Albania</button>

            <button onclick="searchCountry('Algeria')">Algeria</button>
            <button onclick="searchCountry('Andorra')">Andorra</button>

            <button onclick="searchCountry('Angola')">Angola</button>
            <button onclick="searchCountry('Antigua and Barbuda')">Antigua and Barbuda</button>

            <button onclick="searchCountry('Argentina')">Argentina</button>
            <button onclick="searchCountry('Armenia')">Armenia</button>

            <button onclick="searchCountry('Australia')">Australia</button>
            <button onclick="searchCountry('Austria')">Austria</button>

            <button onclick="searchCountry('Azerbaijan')">Azerbaijan</button>
            <button onclick="searchCountry('Bahamas')">Bahamas</button>

            <button onclick="searchCountry('Bahrain')">Bahrain</button>
            <button onclick="searchCountry('Bangladesh')">Bangladesh</button>

            <button onclick="searchCountry('Barbados')">Barbados</button>
            <button onclick="searchCountry('Belarus')">Belarus</button>

            <button onclick="searchCountry('Belgium')">Belgium</button>
            <button onclick="searchCountry('Belize')">Belize</button>

            <button onclick="searchCountry('Benin')">Benin</button>
            <button onclick="searchCountry('Bhutan')">Bhutan</button>

        </div>

    </div>

    <script>
        function searchCountry(country) {
            const bingSearch =
                "https://www.bing.com/search?q=" +
                encodeURIComponent(country);

            window.location.href = bingSearch;
        }
    </script>

</body>
</html>
