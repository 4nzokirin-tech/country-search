    <title>Country Copy 2</title>

    <style>

        * {
            box-sizing: border-box;
        }

        html,
        body {

            margin: 0;
            padding: 0;

            width: 100%;
            height: 100%;

            overflow: hidden;

            font-family: Arial, sans-serif;
        }

        body {

            background: #f5f5f5;

            display: flex;

            justify-content: center;
            align-items: center;
        }

        .app {

            width: 100%;
            max-width: 900px;

            height: 100dvh;

            padding: 12px;

            display: flex;
            flex-direction: column;
        }

        h1 {

            text-align: center;

            margin: 5px 0 12px;

            font-size: 24px;
        }

        .country-list {

            flex: 1;

            display: grid;

            grid-template-columns: repeat(4, 1fr);

            grid-template-rows: repeat(15, 1fr);

            grid-auto-flow: column;

            gap: 6px;
        }

        .country-button {

            width: 100%;
            height: 100%;

            border: none;

            border-radius: 8px;

            background: white;

            box-shadow:
                0 2px 5px rgba(0, 0, 0, 0.15);

            font-size: 13px;

            font-weight: bold;

            cursor: pointer;

            padding: 3px;

            transition: 0.15s;
        }

        .country-button:active {

            transform: scale(0.95);
        }

        .country-button.copied {

            background: #b7f7c1;
        }

    </style>

</head>

<body>

    <script>

        function copyCountry(button) {

            const country =
                button.innerText.trim();


            navigator.clipboard.writeText(country);


            const originalText =
                button.innerText;


            button.innerText =
                "Copied!";


            button.classList.add(
                "copied"
            );


            setTimeout(() => {

                button.innerText =
                    originalText;


                button.classList.remove(
                    "copied"
                );

            }, 1000);

        }

    </script>
